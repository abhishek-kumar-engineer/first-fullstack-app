<aside class="sidebar" [class.collapsed]="collapsed">

  <!-- New button -->
  <button class="new-btn" type="button">
    <i class="bi bi-plus-lg"></i>
    <span class="label">New</span>
  </button>

  <nav class="sidebar-nav">
    <div class="section" *ngFor="let section of sections">

      <div class="section-title" *ngIf="section.title">
        {{ section.title }}
      </div>

      <ul class="item-list">
        <li
          *ngFor="let item of section.items"
          class="item"
          [class.active]="item.label === activeLabel"
          [title]="item.label"
          (click)="setActive(item)">
          <i class="bi item-icon" [ngClass]="item.icon"></i>
          <span class="label">{{ item.label }}</span>
          <span class="badge" *ngIf="item.badge">{{ item.badge }}</span>
        </li>
      </ul>

    </div>
  </nav>

</aside>
