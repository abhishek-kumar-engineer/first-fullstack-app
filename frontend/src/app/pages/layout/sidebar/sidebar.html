<!-- src/app/layout/sidebar/sidebar.component.html -->
<aside class="sidebar" [class.collapsed]="collapsed">

  <!-- New button -->
  <button class="new-btn" type="button">
    <i class="bi bi-plus-lg"></i>
    <span class="label" *ngIf="!collapsed">New</span>
  </button>

  <nav class="sidebar-nav">
    <div class="section" *ngFor="let section of sections">

      <!-- Section title — collapsed hone pe hide karo -->
      <div class="section-title"
           *ngIf="section.title && !collapsed">
        {{ section.title }}
      </div>

      <ul class="item-list">
        <li
          *ngFor="let item of section.items"
          class="item"
          [class.active]="item.label === activeLabel"
          [title]="item.label"
          (click)="setActive(item)">

          <i class="bi item-icon" [ngClass]="item.icon"></i>

          <!-- Label — collapsed hone pe hide karo -->
          <span class="label" *ngIf="!collapsed">
            {{ item.label }}
          </span>

          <!-- Badge — collapsed hone pe bhi dikhao -->
          <span class="badge" *ngIf="item.badge && !collapsed">
            {{ item.badge }}
          </span>

        </li>
      </ul>

    </div>
  </nav>

</aside>
