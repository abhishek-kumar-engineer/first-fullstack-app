<!-- src/app/pages/home/home.component.html -->
<div class="container">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="brand">🚀 MyApp</div>
    <div class="nav-right">
      <span class="welcome">
        Hello, <strong>{{ user?.name }}</strong> 👋
      </span>
      <button class="logout-btn" (click)="logout()">
        Logout
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="content">

    <!-- Welcome Card -->
    <div class="welcome-card">
      <div class="avatar">
        {{ user?.name?.charAt(0)?.toUpperCase() }}
      </div>
      <h1>Welcome, {{ user?.name }}! 🎉</h1>
      <p>Tu successfully login ho gaya hai.</p>
    </div>

    <!-- Info Cards -->
    <div class="cards-grid">

      <div class="card">
        <div class="card-icon">👤</div>
        <div class="card-info">
          <span class="card-label">Name</span>
          <span class="card-value">{{ user?.name }}</span>
        </div>
      </div>

      <div class="card">
        <div class="card-icon">📧</div>
        <div class="card-info">
          <span class="card-label">Email</span>
          <span class="card-value">{{ user?.email }}</span>
        </div>
      </div>

      <div class="card">
        <div class="card-icon">🔐</div>
        <div class="card-info">
          <span class="card-label">Status</span>
          <span class="card-value status">Active ✅</span>
        </div>
      </div>

    </div>

  </div>

</div>
