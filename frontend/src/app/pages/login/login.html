<!-- src/app/pages/login/login.component.html -->
<div class="container">
  <div class="card">

    <h2>Welcome Back 👋</h2>
    <p class="subtitle">Login into your account</p>

    <!-- Error Message -->
    <div class="alert error" *ngIf="errorMsg">
      ❌ {{ errorMsg }}
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="formData.email"
          name="email"
          placeholder="email@example.com"
          required
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="formData.password"
          name="password"
          placeholder="Apna password likho"
          required
        />
      </div>
      <span class="link">
        <a routerLink="/forgot-password">Password bhool gaye?</a>
      </span>
      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>

    </form>

    <p class="link">
      Account nahi hai?
      <a routerLink="/register">Register karo</a>
    </p>

  </div>
</div>
