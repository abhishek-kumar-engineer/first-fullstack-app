<div class="container">
  <div class="card">
    <h2>Forgot Password 🔑</h2>
    <p class="subtitle">
      Apna registered email enter karo —
      hum reset link bhejenge
    </p>

    <div class="alert success" *ngIf="successMsg">
      ✅ {{ successMsg }}
    </div>
    <div class="alert error" *ngIf="errorMsg">
      ❌ {{ errorMsg }}
    </div>

    <form (ngSubmit)="onSubmit()" *ngIf="!successMsg">
      <div class="form-group">
        <label>Email Address</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="email@example.com"
          required
        />
      </div>
      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </form>

    <p class="link">
      Yaad aa gaya?
      <a routerLink="/login">Login karo</a>
    </p>
  </div>
</div>
