<div class="container">
  <div class="card">
    <h2>Reset Password 🔐</h2>
    <p class="subtitle">Apna naya password enter karo</p>

    <div class="alert success" *ngIf="successMsg">
      ✅ {{ successMsg }} — Redirecting to login...
    </div>

    <div class="alert error" *ngIf="errorMsg">
      ❌ {{ errorMsg }}
    </div>

    <div class="alert error" *ngIf="errors.length > 0">
      <ul>
        <li *ngFor="let err of errors">❌ {{ err }}</li>
      </ul>
    </div>

    <form (ngSubmit)="onSubmit()" *ngIf="!successMsg && token">
      <div class="form-group">
        <label>New Password</label>
        <input
          type="password"
          [(ngModel)]="new_password"
          name="new_password"
          placeholder="Min 6 chars, 1 uppercase, 1 number"
          required
        />
      </div>
      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

    <p class="link">
      <a routerLink="/forgot-password">
        New reset link chahiye?
      </a>
    </p>
  </div>
</div>
